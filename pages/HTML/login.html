<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Son-Rise | Login</title>
    <link rel="stylesheet" href="../../assets/CSS/login.css">
    <link rel="shortcut icon" href="../../assets/Logos/sonrise.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page-bg">

    <div class="login-container">
        <div class="login-card">
            <a href="../index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
            
            <h2>Welcome Back</h2>
            <p>Login to continue your creative journey.</p>

            <form action="login.html" class="auth-form">
                <div class="social-auth">
                    <button type="submit" class="social-btn google">
                        <i class="fa-brands fa-google"></i> Continue with Google
                    </button>
                    <!-- <button type="submit" class="social-btn apple">
                        <i class="fa-brands fa-apple"></i> Continue with Apple
                    </button> -->
                </div>
            </form>
        </div>
    </div>

</body>
